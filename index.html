<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }

  #app {
    width: 100%;
    max-width: 800px;
    border-radius: 12px;
    overflow: hidden;
    background: #161b22;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* ── Clock Bar ── */
  #clock-bar {
    display: flex;
    justify-content: space-around;
    padding: 14px 12px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    flex-wrap: wrap;
    gap: 10px;
  }

  .clock-widget {
    text-align: center;
    position: relative;
    min-width: 120px;
    flex: 1;
    background: #1c2128;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 12px 8px 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    border-top: 3px solid #58a6ff;
  }

  .clock-time {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.8rem;
    font-weight: bold;
    letter-spacing: 2px;
    color: #e6edf3;
    text-shadow: 0 0 8px rgba(88,166,255,0.3);
    line-height: 1.2;
  }

  .clock-date {
    font-size: 0.7rem;
    color: #8b949e;
    margin-top: 2px;
  }

  .clock-tz {
    font-size: 0.65rem;
    color: #6e7681;
    margin-top: 1px;
    letter-spacing: 0.5px;
  }

  .clock-label {
    font-size: 0.75rem;
    cursor: pointer;
    margin-top: 6px;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .clock-label:hover {
    background: rgba(88,166,255,0.15);
  }
  .clock-marker {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .clock-label-text {
    color: #58a6ff;
  }

  .tz-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    max-height: 320px;
    background: #1c2128;
    border: 1px solid #30363d;
    border-radius: 8px;
    z-index: 100;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    flex-direction: column;
  }
  .tz-dropdown.open { display: flex; }

  .tz-search {
    width: 100%;
    padding: 8px 10px;
    background: #0d1117;
    border: none;
    border-bottom: 1px solid #30363d;
    color: #e6edf3;
    font-size: 0.8rem;
    outline: none;
  }
  .tz-search::placeholder { color: #484f58; }

  .tz-list {
    overflow-y: auto;
    flex: 1;
  }

  .tz-item {
    padding: 6px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    color: #c9d1d9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tz-item:hover { background: rgba(88,166,255,0.15); color: #e6edf3; }
  .tz-star {
    flex-shrink: 0;
    font-size: 0.8rem;
    color: #484f58;
    cursor: pointer;
    line-height: 1;
  }
  .tz-star:hover { color: #ffd43b; }
  .tz-star.active { color: #ffd43b; }
  .tz-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .tz-fav-divider {
    border: none;
    border-top: 1px solid #30363d;
    margin: 2px 10px;
  }
  .tz-item-offset {
    color: #8b949e;
    margin-left: 4px;
    font-size: 0.7rem;
  }

  /* ── Map ── */
  #map-container {
    position: relative;
    width: 100%;
    cursor: grab;
    line-height: 0;
  }
  #map-container.dragging { cursor: grabbing; }

  #map-canvas {
    width: 100%;
    display: block;
  }

  #time-indicator {
    display: none;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22,27,34,0.85);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    color: #8b949e;
    pointer-events: none;
    border: 1px solid #30363d;
  }

  #reset-btn {
    display: none;
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(88,166,255,0.2);
    border: 1px solid #58a6ff;
    color: #58a6ff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  #reset-btn:hover { background: rgba(88,166,255,0.35); }

  /* ── Settings ── */
  #settings-btn {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(88,166,255,0.2);
    border: 1px solid #58a6ff;
    color: #58a6ff;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  #settings-btn:hover { background: rgba(88,166,255,0.35); }

  #settings-panel {
    display: none;
    background: #1c2128;
    border-top: 1px solid #30363d;
    padding: 14px 18px;
    font-size: 0.78rem;
    color: #c9d1d9;
  }
  #settings-panel.open { display: block; }

  .settings-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .settings-row:last-child { margin-bottom: 0; }

  .settings-label {
    width: 110px;
    flex-shrink: 0;
    color: #8b949e;
  }

  .settings-colors {
    display: flex;
    gap: 8px;
  }
  .settings-colors input[type="color"] {
    width: 28px;
    height: 28px;
    border: 1px solid #30363d;
    border-radius: 4px;
    background: none;
    cursor: pointer;
    padding: 0;
  }

  .settings-slider {
    flex: 1;
    max-width: 200px;
    accent-color: #58a6ff;
  }

  .settings-value {
    width: 40px;
    text-align: right;
    color: #8b949e;
    font-size: 0.72rem;
  }

  @media (max-width: 600px) {
    .clock-time { font-size: 1.3rem; }
    .clock-widget { min-width: 90px; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="clock-bar"></div>
  <div id="map-container">
    <canvas id="map-canvas"></canvas>
    <div id="time-indicator"></div>
    <button id="reset-btn">Reset to now</button>
    <button id="settings-btn">&#9881;</button>
  </div>
  <div id="settings-panel">
    <div class="settings-row">
      <span class="settings-label">Accent colors</span>
      <div class="settings-colors" id="color-pickers"></div>
    </div>
    <div class="settings-row">
      <span class="settings-label">Widget opacity</span>
      <input type="range" class="settings-slider" id="opacity-slider" min="30" max="100" value="100">
      <span class="settings-value" id="opacity-value">100%</span>
    </div>
    <div class="settings-row">
      <span class="settings-label">Clock font size</span>
      <input type="range" class="settings-slider" id="fontsize-slider" min="10" max="32" value="18">
      <span class="settings-value" id="fontsize-value">1.8rem</span>
    </div>
  </div>
</div>

// Marker colors for the 4 clock slots
const DEFAULT_COLORS = ['#ff6b6b', '#51cf66', '#ffd43b', '#cc5de8'];
const MARKER_COLORS = [...DEFAULT_COLORS];

// ════════════════════════════════════════════════════════════════
// SETTINGS (persisted to localStorage)
// ════════════════════════════════════════════════════════════════
const savedSettings = JSON.parse(localStorage.getItem('ts-settings') || '{}');
if (savedSettings.colors) {
  savedSettings.colors.forEach((c, i) => { if (i < 4) MARKER_COLORS[i] = c; });
}
let widgetOpacity = savedSettings.opacity ?? 100;
let clockFontSize = savedSettings.fontSize ?? 18;

function saveSettings() {
  localStorage.setItem('ts-settings', JSON.stringify({
    colors: [...MARKER_COLORS],
    opacity: widgetOpacity,
    fontSize: clockFontSize,
  }));
}

function applySettings() {
  // Opacity on clock widgets
  document.querySelectorAll('.clock-widget').forEach(w => {
    w.style.opacity = widgetOpacity / 100;
  });
  // Font size on clock time displays
  document.querySelectorAll('.clock-time').forEach(el => {
    el.style.fontSize = (clockFontSize / 10) + 'rem';

// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let timeOffsetMs = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartOffset = 0;
let timeFrozen = false;

// Favourite location indices — persisted to localStorage
let favourites = new Set(JSON.parse(localStorage.getItem('ts-favourites') || '[]'));
function saveFavourites() {
  localStorage.setItem('ts-favourites', JSON.stringify([...favourites]));
}

// Each slot stores the index into LOCATIONS
let selectedLocationIdx = [
  LOCATIONS.findIndex(l => l.name === 'New York'),
  LOCATIONS.findIndex(l => l.name === 'London'),
  LOCATIONS.findIndex(l => l.name === 'Tokyo'),
  LOCATIONS.findIndex(l => l.name === 'Sydney'),
];

// ════════════════════════════════════════════════════════════════
// CANVAS & ELEMENTS
// ════════════════════════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const mapContainer = document.getElementById('map-container');
const clockBar = document.getElementById('clock-bar');
const timeIndicator = document.getElementById('time-indicator');
const resetBtn = document.getElementById('reset-btn');

let baseMapCache = null;
let canvasW = 0, canvasH = 0;
const DPR = window.devicePixelRatio || 1;

// ════════════════════════════════════════════════════════════════
// TIMEZONE OFFSET HELPERS
// ════════════════════════════════════════════════════════════════
function getUtcOffset(tz, date) {
  // Returns offset string like "UTC+5:30" or "UTC-8"
  try {
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, timeZoneName: 'shortOffset'
    });
    const parts = fmt.formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    if (tzPart) return tzPart.value; // e.g. "GMT+5:30"
  } catch {}
  return '';
}

function getShortTzName(tz, date) {
  // Returns short name like "EST", "IST", "PST"
  try {
    const fmt = new Intl.DateTimeFormat('en-US', {
      timeZone: tz, timeZoneName: 'short'
    });
    const parts = fmt.formatToParts(date);
    const tzPart = parts.find(p => p.type === 'timeZoneName');
    if (tzPart) return tzPart.value;
  } catch {}
  return '';
}

// ════════════════════════════════════════════════════════════════
// SOLAR MATH
// ════════════════════════════════════════════════════════════════
function toRad(d) { return d * Math.PI / 180; }

function dayOfYear(date) {
  const start = new Date(date.getUTCFullYear(), 0, 0);
  const diff = date - start;
  return Math.floor(diff / 86400000);
}

function getSolarPosition(date) {
  const doy = dayOfYear(date);
  const declination = -23.44 * Math.cos(toRad((360 / 365) * (doy + 10)));
  const utcH = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  let subsolarLng = 180 - (utcH / 24) * 360;
  if (subsolarLng < -180) subsolarLng += 360;
  if (subsolarLng > 180) subsolarLng -= 360;
  return { declination, subsolarLng };
}

// ════════════════════════════════════════════════════════════════
// MAP RENDERING
// ════════════════════════════════════════════════════════════════
// Shift map so left edge starts at -168° (pure ocean), Alaska on far left
const MAP_SHIFT = 12;

function lngToX(lng) {
  return (((lng - MAP_SHIFT + 180) % 360 + 360) % 360) / 360 * canvasW;
}
function latToY(lat) { return (90 - lat) / 180 * canvasH; }

function drawBaseMap() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvasW;
  offscreen.height = canvasH;
  const octx = offscreen.getContext('2d');

  // Ocean
  octx.fillStyle = '#0a1628';
  octx.fillRect(0, 0, canvasW, canvasH);

  // Land — render in original -180..180 coordinates
  octx.fillStyle = '#1a2d50';
  octx.strokeStyle = '#243a5e';
  octx.lineWidth = 0.5;

  for (const poly of LAND) {
    octx.beginPath();
    for (let i = 0; i < poly.length; i++) {
      const x = (poly[i][0] + 180) / 360 * canvasW;
      const y = (90 - poly[i][1]) / 180 * canvasH;
      if (i === 0) octx.moveTo(x, y);
      else octx.lineTo(x, y);
    }
    octx.closePath();
    octx.fill();
    octx.stroke();
  }

  // Pixel-shift the rendered map so left edge = -168° longitude
  const shiftPx = Math.round((MAP_SHIFT / 360) * canvasW);
  if (shiftPx > 0) {
    const temp = document.createElement('canvas');
    temp.width = canvasW;
    temp.height = canvasH;
    const tctx = temp.getContext('2d');
    tctx.drawImage(offscreen, shiftPx, 0, canvasW - shiftPx, canvasH, 0, 0, canvasW - shiftPx, canvasH);
    tctx.drawImage(offscreen, 0, 0, shiftPx, canvasH, canvasW - shiftPx, 0, shiftPx, canvasH);
    octx.clearRect(0, 0, canvasW, canvasH);
    octx.drawImage(temp, 0, 0);
  }

  baseMapCache = offscreen;
}

function drawSunlightOverlay(date) {
  const { declination, subsolarLng } = getSolarPosition(date);
  const decRad = toRad(declination);

  const step = 2;
  const overlayCanvas = document.createElement('canvas');
  overlayCanvas.width = canvasW;
  overlayCanvas.height = canvasH;
  const octx = overlayCanvas.getContext('2d');
  const imgData = octx.createImageData(canvasW, canvasH);
  const data = imgData.data;

  const sinDec = Math.sin(decRad);
  const cosDec = Math.cos(decRad);

  for (let py = 0; py < canvasH; py += step) {
    const lat = 90 - (py / canvasH) * 180;
    const latRad = toRad(lat);
    const sinLat = Math.sin(latRad);
    const cosLat = Math.cos(latRad);

    for (let px = 0; px < canvasW; px += step) {
      // Map pixel to longitude accounting for map shift
      let lng = (px / canvasW) * 360 - 180 + MAP_SHIFT;
      if (lng > 180) lng -= 360;
      const ha = toRad(lng - subsolarLng);
      const sinAlt = sinLat * sinDec + cosLat * cosDec * Math.cos(ha);

      // Smooth transition: daylight above ~0°, full night below ~-6° (civil twilight)
      let alpha;
      if (sinAlt > 0.0) {
        alpha = 0;
      } else if (sinAlt < -0.105) {
        alpha = 120;
      } else {
        const t = (sinAlt - 0.0) / (-0.105);
        alpha = Math.floor(t * 120);
      }

      for (let dy = 0; dy < step && (py + dy) < canvasH; dy++) {
        for (let dx = 0; dx < step && (px + dx) < canvasW; dx++) {
          const idx = ((py + dy) * canvasW + (px + dx)) * 4;
          data[idx] = 0;
          data[idx + 1] = 0;
          data[idx + 2] = 0;
          data[idx + 3] = alpha;
        }
      }
    }
  }

  octx.putImageData(imgData, 0, 0);

  return overlayCanvas;
}

function drawMarkers() {
  for (let i = 0; i < 4; i++) {
    const loc = LOCATIONS[selectedLocationIdx[i]];
    const x = lngToX(loc.lng);
    const y = latToY(loc.lat);
    const color = MARKER_COLORS[i];

    // Outer glow
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI * 2);
    ctx.fillStyle = color + '30';
    ctx.fill();

    // Filled circle
    ctx.beginPath();
    ctx.arc(x, y, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // White center dot
    ctx.beginPath();
    ctx.arc(x, y, 1.2, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }
}

function render() {
  const effectiveDate = new Date(Date.now() + timeOffsetMs);

  if (!baseMapCache) drawBaseMap();

  ctx.drawImage(baseMapCache, 0, 0);

  const overlay = drawSunlightOverlay(effectiveDate);
  ctx.drawImage(overlay, 0, 0);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(88,166,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let lng = -180; lng <= 180; lng += 30) {
    const x = lngToX(lng);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvasH); ctx.stroke();
  }
  for (let lat = -90; lat <= 90; lat += 30) {
    const y = latToY(lat);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasW, y); ctx.stroke();
  }

  drawMarkers();
}

// ════════════════════════════════════════════════════════════════
// CLOCKS
// ════════════════════════════════════════════════════════════════
function sortClocksByLongitude() {
  // Sort selected locations by their x-position on the map (left to right)
  selectedLocationIdx.sort((a, b) => lngToX(LOCATIONS[a].lng) - lngToX(LOCATIONS[b].lng));
}

function buildClockBar() {
  clockBar.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const loc = LOCATIONS[selectedLocationIdx[i]];
    const w = document.createElement('div');
    w.className = 'clock-widget';
    w.style.borderTopColor = MARKER_COLORS[i];
    w.innerHTML = `
      <div class="clock-time" id="ct${i}">--:--</div>
      <div class="clock-date" id="cd${i}"></div>
      <div class="clock-tz" id="ctz${i}"></div>
      <div class="clock-label" id="cl${i}">
        <span class="clock-marker" style="background:${MARKER_COLORS[i]}"></span>
        <span class="clock-label-text" id="clt${i}">${loc.name}</span>
      </div>
      <div class="tz-dropdown" id="dd${i}">
        <input class="tz-search" placeholder="Search city or timezone..." id="ds${i}">
        <div class="tz-list" id="dl${i}"></div>
      </div>`;
    clockBar.appendChild(w);
  }

  for (let i = 0; i < 4; i++) {
    const label = document.getElementById(`cl${i}`);
    const dropdown = document.getElementById(`dd${i}`);
    const search = document.getElementById(`ds${i}`);
    const list = document.getElementById(`dl${i}`);

    label.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.tz-dropdown.open').forEach(d => {
        if (d !== dropdown) d.classList.remove('open');
      });
      dropdown.classList.toggle('open');
      if (dropdown.classList.contains('open')) {
        search.value = '';
        populateLocationList(list, '', i);
        search.focus();
      }
    });

    search.addEventListener('input', () => {
      populateLocationList(list, search.value, i);
    });
    search.addEventListener('click', e => e.stopPropagation());
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.tz-dropdown.open').forEach(d => d.classList.remove('open'));
  });
}

function populateLocationList(listEl, filter, clockIndex) {
  const now = new Date(Date.now() + timeOffsetMs);
  const lowerFilter = filter.toLowerCase();

  // Locations already used by other clocks (prevent duplicates)
  const usedIndices = new Set(selectedLocationIdx.filter((_, i) => i !== clockIndex));

  // Filter locations — exclude already-selected
  const filtered = [];
  for (let idx = 0; idx < LOCATIONS.length; idx++) {
    if (usedIndices.has(idx)) continue;
    const loc = LOCATIONS[idx];
    if (filter) {
      const offset = getUtcOffset(loc.tz, now);
      const abbr = getShortTzName(loc.tz, now);
      const match = loc.name.toLowerCase().includes(lowerFilter) ||
                    loc.tz.toLowerCase().includes(lowerFilter) ||
                    offset.toLowerCase().includes(lowerFilter) ||
                    abbr.toLowerCase().includes(lowerFilter);
      if (!match) continue;
    }
    filtered.push(idx);
  }

  // Sort: favourites first, then the rest
  filtered.sort((a, b) => {
    const aFav = favourites.has(a);
    const bFav = favourites.has(b);
    if (aFav && !bFav) return -1;
    if (!aFav && bFav) return 1;
    return 0;
  });

  listEl.innerHTML = '';
  const frag = document.createDocumentFragment();
  let addedDivider = false;

  for (const locIdx of filtered) {
    const loc = LOCATIONS[locIdx];
    const isFav = favourites.has(locIdx);

    // Add divider between favourites and non-favourites
    if (!isFav && !addedDivider && favourites.size > 0 && filtered.some(i => favourites.has(i))) {
      const hr = document.createElement('hr');
      hr.className = 'tz-fav-divider';
      frag.appendChild(hr);
      addedDivider = true;
    }

    const offset = getUtcOffset(loc.tz, now);
    const abbr = getShortTzName(loc.tz, now);

    const item = document.createElement('div');
    item.className = 'tz-item';

    const star = document.createElement('span');
    star.className = 'tz-star' + (isFav ? ' active' : '');
    star.textContent = isFav ? '\u2605' : '\u2606';
    star.addEventListener('click', (e) => {
      e.stopPropagation();
      if (favourites.has(locIdx)) {
        favourites.delete(locIdx);
      } else {
        favourites.add(locIdx);
      }
      saveFavourites();
      populateLocationList(listEl, filter, clockIndex);
    });

    const nameSpan = document.createElement('span');
    nameSpan.className = 'tz-item-name';
    nameSpan.innerHTML = `${loc.name} <span class="tz-item-offset">${abbr} ${offset}</span>`;
    nameSpan.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedLocationIdx[clockIndex] = locIdx;
      sortClocksByLongitude();
      buildClockBar();
      updateClocks();
      applySettings();
      render();
    });

    item.appendChild(star);
    item.appendChild(nameSpan);
    frag.appendChild(item);
  }
  listEl.appendChild(frag);
}

function updateClocks() {
  const now = new Date(Date.now() + timeOffsetMs);
  for (let i = 0; i < 4; i++) {
    const loc = LOCATIONS[selectedLocationIdx[i]];
    try {
      const timeFmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: loc.tz, hour: '2-digit', minute: '2-digit', hour12: false
      });
      const dateFmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: loc.tz, weekday: 'short', month: 'short', day: 'numeric'
      });
      document.getElementById(`ct${i}`).textContent = timeFmt.format(now);
      document.getElementById(`cd${i}`).textContent = dateFmt.format(now);
      const abbr = getShortTzName(loc.tz, now);
      const offset = getUtcOffset(loc.tz, now);
      document.getElementById(`ctz${i}`).textContent = `${abbr} ${offset}`;
    } catch {
      document.getElementById(`ct${i}`).textContent = '--:--';
    }
  }
}

// ════════════════════════════════════════════════════════════════
// DRAG INTERACTION (inverted: sunshine follows the mouse)
// ════════════════════════════════════════════════════════════════
function onDragStart(x) {
  isDragging = true;
  dragStartX = x;
  dragStartOffset = timeOffsetMs;
  mapContainer.classList.add('dragging');
}

function onDragMove(x) {
  if (!isDragging) return;
  const dx = x - dragStartX;
  const rect = canvas.getBoundingClientRect();
  // Inverted: dragging right moves sun right (earlier in time)
  timeOffsetMs = dragStartOffset - (dx / rect.width) * 24 * 3600 * 1000;
  updateClocks();
  render();

  const offsetHours = timeOffsetMs / 3600000;
  const sign = offsetHours >= 0 ? '+' : '';
  const h = Math.floor(Math.abs(offsetHours));
  const m = Math.floor((Math.abs(offsetHours) - h) * 60);
  timeIndicator.style.display = 'block';
  timeIndicator.textContent = `${sign}${offsetHours < 0 ? '-' : ''}${h}h ${m}m from now`;

  resetBtn.style.display = Math.abs(timeOffsetMs) > 60000 ? 'block' : 'none';
}

function onDragEnd() {
  isDragging = false;
  mapContainer.classList.remove('dragging');
  timeFrozen = Math.abs(timeOffsetMs) > 60000;
}

canvas.addEventListener('mousedown', e => onDragStart(e.clientX));
window.addEventListener('mousemove', e => onDragMove(e.clientX));
window.addEventListener('mouseup', onDragEnd);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  onDragStart(e.touches[0].clientX);
}, { passive: false });
window.addEventListener('touchmove', e => onDragMove(e.touches[0].clientX));
window.addEventListener('touchend', onDragEnd);

resetBtn.addEventListener('click', () => {
  timeOffsetMs = 0;
  timeFrozen = false;
  timeIndicator.style.display = 'none';
  resetBtn.style.display = 'none';
  updateClocks();
  render();
});

// ════════════════════════════════════════════════════════════════
// RESIZE & INIT
// ════════════════════════════════════════════════════════════════
function resize() {
  const rect = mapContainer.getBoundingClientRect();
  const w = Math.floor(rect.width);
  const h = Math.floor(w / 2);
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.height = h + 'px';
  ctx.scale(DPR, DPR);
  canvasW = w;
  canvasH = h;
  baseMapCache = null;
  render();
}

function tick() {
  if (!isDragging && !timeFrozen) {
    updateClocks();
    render();
  }
  setTimeout(tick, 1000);
}

function initSettings() {
  const panel = document.getElementById('settings-panel');
  const btn = document.getElementById('settings-btn');
  btn.addEventListener('click', () => panel.classList.toggle('open'));

  // Color pickers
  const colorContainer = document.getElementById('color-pickers');
  for (let i = 0; i < 4; i++) {
    const input = document.createElement('input');
    input.type = 'color';
    input.value = MARKER_COLORS[i];
    input.title = `Clock ${i + 1} accent`;
    input.addEventListener('input', () => {
      MARKER_COLORS[i] = input.value;
      saveSettings();
      buildClockBar();
      updateClocks();
      applySettings();
      baseMapCache = null;
      render();
    });
    colorContainer.appendChild(input);
  }

  // Opacity slider
  const opSlider = document.getElementById('opacity-slider');
  const opValue = document.getElementById('opacity-value');
  opSlider.value = widgetOpacity;
  opValue.textContent = widgetOpacity + '%';
  opSlider.addEventListener('input', () => {
    widgetOpacity = parseInt(opSlider.value);
    opValue.textContent = widgetOpacity + '%';
    saveSettings();
    applySettings();
  });

  // Font size slider
  const fsSlider = document.getElementById('fontsize-slider');
  const fsValue = document.getElementById('fontsize-value');
  fsSlider.value = clockFontSize;
  fsValue.textContent = (clockFontSize / 10).toFixed(1) + 'rem';
  fsSlider.addEventListener('input', () => {
    clockFontSize = parseInt(fsSlider.value);
    fsValue.textContent = (clockFontSize / 10).toFixed(1) + 'rem';
    saveSettings();
    applySettings();
  });
}

function init() {
  sortClocksByLongitude();
  buildClockBar();
  initSettings();
  applySettings();
  resize();
  tick();
}

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>

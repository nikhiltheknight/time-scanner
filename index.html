<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 20px;
    user-select: none;
  }

  #app {
    width: 100%;
    max-width: 800px;
    border-radius: 12px;
    overflow: hidden;
    background: #161b22;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  /* ── Clock Bar ── */
  #clock-bar {
    display: flex;
    justify-content: space-around;
    padding: 16px 12px;
    background: #161b22;
    border-bottom: 1px solid #21262d;
    flex-wrap: wrap;
    gap: 8px;
  }

  .clock-widget {
    text-align: center;
    position: relative;
    min-width: 120px;
    flex: 1;
  }

  .clock-time {
    font-family: 'Courier New', Courier, monospace;
    font-size: 1.8rem;
    font-weight: bold;
    letter-spacing: 2px;
    color: #e6edf3;
    text-shadow: 0 0 8px rgba(88,166,255,0.3);
    line-height: 1.2;
  }

  .clock-date {
    font-size: 0.7rem;
    color: #8b949e;
    margin-top: 2px;
  }

  .clock-label {
    font-size: 0.75rem;
    color: #58a6ff;
    cursor: pointer;
    margin-top: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    transition: background 0.15s;
    display: inline-block;
  }
  .clock-label:hover {
    background: rgba(88,166,255,0.15);
  }

  .tz-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    max-height: 280px;
    background: #1c2128;
    border: 1px solid #30363d;
    border-radius: 8px;
    z-index: 100;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    flex-direction: column;
  }
  .tz-dropdown.open { display: flex; }

  .tz-search {
    width: 100%;
    padding: 8px 10px;
    background: #0d1117;
    border: none;
    border-bottom: 1px solid #30363d;
    color: #e6edf3;
    font-size: 0.8rem;
    outline: none;
  }
  .tz-search::placeholder { color: #484f58; }

  .tz-list {
    overflow-y: auto;
    flex: 1;
  }

  .tz-item {
    padding: 6px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    color: #c9d1d9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tz-item:hover { background: rgba(88,166,255,0.15); color: #e6edf3; }

  /* ── Map ── */
  #map-container {
    position: relative;
    width: 100%;
    cursor: grab;
    line-height: 0;
  }
  #map-container.dragging { cursor: grabbing; }

  #map-canvas {
    width: 100%;
    display: block;
  }

  #time-indicator {
    display: none;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22,27,34,0.85);
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    color: #8b949e;
    pointer-events: none;
    border: 1px solid #30363d;
  }

  #reset-btn {
    display: none;
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(88,166,255,0.2);
    border: 1px solid #58a6ff;
    color: #58a6ff;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.72rem;
    cursor: pointer;
  }
  #reset-btn:hover { background: rgba(88,166,255,0.35); }

  @media (max-width: 600px) {
    .clock-time { font-size: 1.3rem; }
    .clock-widget { min-width: 90px; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="clock-bar"></div>
  <div id="map-container">
    <canvas id="map-canvas"></canvas>
    <div id="time-indicator"></div>
    <button id="reset-btn">Reset to now</button>
  </div>
</div>

8,74],[68,72],[72,72],[74,74],[76,72],[78,72],[80,72]]];

// ════════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════════
let timeOffsetMs = 0;
let isDragging = false;
let dragStartX = 0;
let dragStartOffset = 0;
let selectedTimezones = [
  'America/New_York',
  'Europe/London',
  'Asia/Tokyo',
  'Australia/Sydney'
];

// ════════════════════════════════════════════════════════════════
// CANVAS & ELEMENTS
// ════════════════════════════════════════════════════════════════
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');
const mapContainer = document.getElementById('map-container');
const clockBar = document.getElementById('clock-bar');
const timeIndicator = document.getElementById('time-indicator');
const resetBtn = document.getElementById('reset-btn');

let baseMapCache = null; // offscreen canvas for the base map
let canvasW = 0, canvasH = 0;
const DPR = window.devicePixelRatio || 1;

// ════════════════════════════════════════════════════════════════
// SOLAR MATH
// ════════════════════════════════════════════════════════════════
function toRad(d) { return d * Math.PI / 180; }

function dayOfYear(date) {
  const start = new Date(date.getUTCFullYear(), 0, 0);
  const diff = date - start;
  return Math.floor(diff / 86400000);
}

function getSolarPosition(date) {
  const doy = dayOfYear(date);
  // Solar declination (approximate)
  const declination = -23.44 * Math.cos(toRad((360 / 365) * (doy + 10)));
  // Subsolar longitude
  const utcH = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
  let subsolarLng = 180 - (utcH / 24) * 360;
  if (subsolarLng < -180) subsolarLng += 360;
  if (subsolarLng > 180) subsolarLng -= 360;
  return { declination, subsolarLng };
}

// ════════════════════════════════════════════════════════════════
// MAP RENDERING
// ════════════════════════════════════════════════════════════════
function lngToX(lng) { return (lng + 180) / 360 * canvasW; }
function latToY(lat) { return (90 - lat) / 180 * canvasH; }

function drawBaseMap() {
  const offscreen = document.createElement('canvas');
  offscreen.width = canvasW;
  offscreen.height = canvasH;
  const octx = offscreen.getContext('2d');

  // Ocean
  octx.fillStyle = '#0a1628';
  octx.fillRect(0, 0, canvasW, canvasH);

  // Land
  octx.fillStyle = '#1a2d50';
  octx.strokeStyle = '#243a5e';
  octx.lineWidth = 0.5;

  for (const poly of LAND) {
    octx.beginPath();
    for (let i = 0; i < poly.length; i++) {
      const x = lngToX(poly[i][0]);
      const y = latToY(poly[i][1]);
      if (i === 0) octx.moveTo(x, y);
      else octx.lineTo(x, y);
    }
    octx.closePath();
    octx.fill();
    octx.stroke();
  }

  baseMapCache = offscreen;
}

function drawSunlightOverlay(date) {
  const { declination, subsolarLng } = getSolarPosition(date);
  const decRad = toRad(declination);

  // Use a lower resolution for the overlay for performance
  const step = 3;
  const overlayCanvas = document.createElement('canvas');
  overlayCanvas.width = canvasW;
  overlayCanvas.height = canvasH;
  const octx = overlayCanvas.getContext('2d');
  const imgData = octx.createImageData(canvasW, canvasH);
  const data = imgData.data;

  for (let py = 0; py < canvasH; py += step) {
    const lat = 90 - (py / canvasH) * 180;
    const latRad = toRad(lat);
    const sinLat = Math.sin(latRad);
    const cosLat = Math.cos(latRad);
    const sinDec = Math.sin(decRad);
    const cosDec = Math.cos(decRad);

    for (let px = 0; px < canvasW; px += step) {
      const lng = (px / canvasW) * 360 - 180;
      const ha = toRad(lng - subsolarLng);
      const sinAlt = sinLat * sinDec + cosLat * cosDec * Math.cos(ha);

      let alpha;
      if (sinAlt > 0.05) {
        // Day: light overlay
        alpha = 0; // no darkening
      } else if (sinAlt < -0.1) {
        // Night: dark overlay
        alpha = 120;
      } else {
        // Twilight: smooth gradient
        const t = (sinAlt - 0.05) / (-0.15); // 0 at day edge, 1 at night edge
        alpha = Math.floor(t * 120);
      }

      // Fill the step x step block
      for (let dy = 0; dy < step && (py + dy) < canvasH; dy++) {
        for (let dx = 0; dx < step && (px + dx) < canvasW; dx++) {
          const idx = ((py + dy) * canvasW + (px + dx)) * 4;
          data[idx] = 0;
          data[idx + 1] = 0;
          data[idx + 2] = 0;
          data[idx + 3] = alpha;
        }
      }
    }
  }

  octx.putImageData(imgData, 0, 0);

  // Also draw a subtle sun glow at the subsolar point
  const sunX = lngToX(subsolarLng);
  const sunY = latToY(declination);
  const grad = octx.createRadialGradient(sunX, sunY, 0, sunX, sunY, canvasH * 0.15);
  grad.addColorStop(0, 'rgba(255,220,100,0.08)');
  grad.addColorStop(1, 'rgba(255,220,100,0)');
  octx.fillStyle = grad;
  octx.fillRect(0, 0, canvasW, canvasH);

  return overlayCanvas;
}

function render() {
  const effectiveDate = new Date(Date.now() + timeOffsetMs);

  if (!baseMapCache) drawBaseMap();

  ctx.drawImage(baseMapCache, 0, 0);

  const overlay = drawSunlightOverlay(effectiveDate);
  ctx.drawImage(overlay, 0, 0);

  // Draw subtle grid lines
  ctx.strokeStyle = 'rgba(88,166,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let lng = -180; lng <= 180; lng += 30) {
    const x = lngToX(lng);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvasH); ctx.stroke();
  }
  for (let lat = -90; lat <= 90; lat += 30) {
    const y = latToY(lat);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvasW, y); ctx.stroke();
  }
}

// ════════════════════════════════════════════════════════════════
// CLOCKS
// ════════════════════════════════════════════════════════════════
function friendlyName(tz) {
  return tz.replace(/_/g, ' ').split('/').pop();
}

function buildClockBar() {
  clockBar.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const tz = selectedTimezones[i];
    const w = document.createElement('div');
    w.className = 'clock-widget';
    w.innerHTML = `
      <div class="clock-time" id="ct${i}">--:--:--</div>
      <div class="clock-date" id="cd${i}"></div>
      <div class="clock-label" id="cl${i}">${friendlyName(tz)}</div>
      <div class="tz-dropdown" id="dd${i}">
        <input class="tz-search" placeholder="Search timezone..." id="ds${i}">
        <div class="tz-list" id="dl${i}"></div>
      </div>`;
    clockBar.appendChild(w);
  }

  // Wire up dropdowns
  for (let i = 0; i < 4; i++) {
    const label = document.getElementById(`cl${i}`);
    const dropdown = document.getElementById(`dd${i}`);
    const search = document.getElementById(`ds${i}`);
    const list = document.getElementById(`dl${i}`);

    label.addEventListener('click', (e) => {
      e.stopPropagation();
      // Close others
      document.querySelectorAll('.tz-dropdown.open').forEach(d => {
        if (d !== dropdown) d.classList.remove('open');
      });
      dropdown.classList.toggle('open');
      if (dropdown.classList.contains('open')) {
        search.value = '';
        populateTzList(list, '', i);
        search.focus();
      }
    });

    search.addEventListener('input', () => {
      populateTzList(list, search.value, i);
    });
    search.addEventListener('click', e => e.stopPropagation());
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.tz-dropdown.open').forEach(d => d.classList.remove('open'));
  });
}

function getAllTimezones() {
  try {
    return Intl.supportedValuesOf('timeZone');
  } catch {
    // Fallback for older browsers
    return [
      'America/New_York','America/Chicago','America/Denver','America/Los_Angeles',
      'America/Anchorage','Pacific/Honolulu','America/Sao_Paulo','America/Buenos_Aires',
      'Europe/London','Europe/Paris','Europe/Berlin','Europe/Moscow',
      'Asia/Dubai','Asia/Kolkata','Asia/Bangkok','Asia/Shanghai',
      'Asia/Tokyo','Asia/Seoul','Australia/Sydney','Pacific/Auckland',
      'Africa/Cairo','Africa/Lagos','Africa/Johannesburg','Asia/Singapore'
    ];
  }
}

function populateTzList(listEl, filter, clockIndex) {
  const allTz = getAllTimezones();
  const filtered = filter
    ? allTz.filter(tz => tz.toLowerCase().includes(filter.toLowerCase()))
    : allTz;

  listEl.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (const tz of filtered.slice(0, 100)) {
    const item = document.createElement('div');
    item.className = 'tz-item';
    item.textContent = tz.replace(/_/g, ' ');
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedTimezones[clockIndex] = tz;
      document.getElementById(`cl${clockIndex}`).textContent = friendlyName(tz);
      document.getElementById(`dd${clockIndex}`).classList.remove('open');
      updateClocks();
    });
    frag.appendChild(item);
  }
  listEl.appendChild(frag);
}

function updateClocks() {
  const now = new Date(Date.now() + timeOffsetMs);
  for (let i = 0; i < 4; i++) {
    const tz = selectedTimezones[i];
    try {
      const timeFmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
      const dateFmt = new Intl.DateTimeFormat('en-GB', {
        timeZone: tz, weekday: 'short', month: 'short', day: 'numeric'
      });
      document.getElementById(`ct${i}`).textContent = timeFmt.format(now);
      document.getElementById(`cd${i}`).textContent = dateFmt.format(now);
    } catch {
      document.getElementById(`ct${i}`).textContent = '--:--:--';
    }
  }
}

// ════════════════════════════════════════════════════════════════
// DRAG INTERACTION
// ════════════════════════════════════════════════════════════════
function onDragStart(x) {
  isDragging = true;
  dragStartX = x;
  dragStartOffset = timeOffsetMs;
  mapContainer.classList.add('dragging');
}

function onDragMove(x) {
  if (!isDragging) return;
  const dx = x - dragStartX;
  const rect = canvas.getBoundingClientRect();
  // Full canvas width = 24 hours
  timeOffsetMs = dragStartOffset + (dx / rect.width) * 24 * 3600 * 1000;
  updateClocks();
  render();

  // Show time indicator
  const offsetHours = timeOffsetMs / 3600000;
  const sign = offsetHours >= 0 ? '+' : '';
  const h = Math.floor(Math.abs(offsetHours));
  const m = Math.floor((Math.abs(offsetHours) - h) * 60);
  timeIndicator.style.display = 'block';
  timeIndicator.textContent = `${sign}${offsetHours < 0 ? '-' : ''}${h}h ${m}m from now`;

  resetBtn.style.display = Math.abs(timeOffsetMs) > 60000 ? 'block' : 'none';
}

function onDragEnd() {
  isDragging = false;
  mapContainer.classList.remove('dragging');
}

canvas.addEventListener('mousedown', e => onDragStart(e.clientX));
window.addEventListener('mousemove', e => onDragMove(e.clientX));
window.addEventListener('mouseup', onDragEnd);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  onDragStart(e.touches[0].clientX);
}, { passive: false });
window.addEventListener('touchmove', e => onDragMove(e.touches[0].clientX));
window.addEventListener('touchend', onDragEnd);

resetBtn.addEventListener('click', () => {
  timeOffsetMs = 0;
  timeIndicator.style.display = 'none';
  resetBtn.style.display = 'none';
  updateClocks();
  render();
});

// ════════════════════════════════════════════════════════════════
// RESIZE & INIT
// ════════════════════════════════════════════════════════════════
function resize() {
  const rect = mapContainer.getBoundingClientRect();
  const w = Math.floor(rect.width);
  const h = Math.floor(w / 2); // 2:1 aspect ratio
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.height = h + 'px';
  ctx.scale(DPR, DPR);
  canvasW = w;
  canvasH = h;
  baseMapCache = null;
  render();
}

function tick() {
  if (!isDragging) {
    updateClocks();
    render();
  }
  setTimeout(tick, 1000);
}

function init() {
  buildClockBar();
  resize();
  tick();
}

window.addEventListener('resize', resize);
document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>
</body>
